name: Sync IP Folder

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动同步一次
  workflow_dispatch:       # 允许手动点一下运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 本仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      # 下载对方仓库的 IP_Scan/ip 整个文件夹到本地 ip/ 文件夹
      - name: Sync IP files from TV-yjc
        run: |
          mkdir -p ip
          cd ip
          wget -r -np -nH --cut-dirs=2 -R "index.html*" \
            https://raw.githubusercontent.com/adminouyang/TV-yjc/main/IP_Scan/ip/

      # 提交更新
      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip/
          git commit -m "Auto sync ip files" || exit 0
          git push
