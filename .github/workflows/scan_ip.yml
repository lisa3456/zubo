name: Scan_IP
on:
  workflow_dispatch:   # 手动触发
  #schedule:
    #- cron: '30 20 * * *'  # 每天 4:30 AM (UTC+8) 自动运行

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 总超时 60 分钟（安全冗余）
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，解决 Git 冲突

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行 IP 扫描
        run: python scan_ip.py  # 替换成你的脚本文件名

      - name: 推送结果到 GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git pull origin main --rebase || echo "无需变基，远程无更新"
          git add ip/
          git commit -m "update IP scan results $(date -Iseconds)" || echo "无变更，无需提交"
          git push origin main
