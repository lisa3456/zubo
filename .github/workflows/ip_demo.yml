name: IP_dwmo

on:
  workflow_dispatch:  # 允许手动触发
  #schedule:
    #- cron: '0 18 * * *'  # 每天 UTC 18:00（北京时间 02:00）自动运行

jobs:
  sync-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 我的仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 确保 ip_demo 目录存在
        run: mkdir -p ip_demo

      - name: 克隆源仓库 (iptvz)
        run: |
          git clone --depth 1 https://github.com/q1017673817/iptvz.git temp-iptvz

      - name: 复制所有 *_config.txt 到 ip_demo
        run: |
          # 复制 temp-iptvz/ip 下所有 *_config.txt 到 ip_demo
          cp -f temp-iptvz/ip/*_config.txt ip_demo/
          # 删除临时克隆的仓库
          rm -rf temp-iptvz

      - name: 提交并推送更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ip_demo/*_config.txt
          # 只有文件变化时才提交
          git diff --staged --quiet || (git commit -m "同步 iptvz 仓库 *_config.txt 配置文件" && git push)
