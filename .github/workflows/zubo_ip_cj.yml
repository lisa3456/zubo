name: zubo_ip_cj
on:
  schedule:
    - cron: '0 15 * * 0'
  workflow_dispatch:
jobs:
  ip-sync-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: 多源抓取并提取IP（rtp/udp）
        run: |
          set -eo pipefail
          
          # 读取所有现有文件，生成白名单
          declare -A initial_counts
          declare -A existing_file_whitelist  # 文件名白名单，key=文件名，value=1
          existing_files=()
          for file in ./ip/*.txt; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              existing_file_whitelist["$filename"]=1
              initial_counts["$file"]=$(wc -l < "$file" || echo 0)
              existing_files+=("$file")
            fi
          done
          # 无现有文件直接跳过整个步骤
          if [ ${#existing_files[@]} -eq 0 ]; then
            echo "⚠️ ip目录下无现有文件，跳过本步骤"
            exit 0
          fi
          echo "✅ 已加载现有文件白名单，共 ${#existing_files[@]} 个文件"
          for file in "${existing_files[@]}"; do
            echo "  - $(basename "$file")"
          done

          # 核心改造：采集源数组
          declare -a collect_sources=(
            "gongdian|https://gongdian.top/tv/guovin"
            "lgg-lg|https://github.com/lgg-lg/iptv-api/raw/refs/heads/master/output/ipv4/result.txt"
            # 新增源示例："新源名称|新源URL"
          )
          # 统一存储所有源的有效地址，去重
          all_valid_addrs=$(mktemp)
          touch "$all_valid_addrs"

          # 遍历采集源，统一抓取rtp/udp地址
          for source in "${collect_sources[@]}"; do
            IFS='|' read -r src_name src_url <<< "$source"
            echo -e "\n====================================="
            echo "🔍 开始采集【$src_name】，地址：$src_url"
            echo "====================================="
            # 抓取源数据
            src_temp=$(mktemp)
            curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              "$src_url" -o "$src_temp" 2>/dev/null || true
            # 源数据为空则跳过
            if [ ! -s "$src_temp" ]; then
              echo "⚠️  【$src_name】源内容为空，跳过"
              rm -f "$src_temp"
              continue
            fi
            # 统一过滤规则：提取含rtp/udp的host:port，去重后追加到总列表
            src_valid=$(grep -E "rtp|udp" "$src_temp" | grep -E "//([^/:]+):[0-9]+" | \
              grep -Eo "//([^/:]+:[0-9]+)/?" | sed 's#//##;s#/$##' | sort -u)
            if [ -z "$src_valid" ]; then
              echo "⚠️  【$src_name】无有效rtp/udp地址，跳过"
              rm -f "$src_temp"
              continue
            fi
            # 写入总列表并去重
            echo "$src_valid" >> "$all_valid_addrs"
            sort -u "$all_valid_addrs" -o "$all_valid_addrs"
            src_count=$(echo "$src_valid" | wc -l)
            echo "✅  【$src_name】采集完成，提取有效地址：$src_count 条"
            rm -f "$src_temp"
          done

          # 检查总有效地址数
          total_valid_count=$(wc -l < "$all_valid_addrs" || echo 0)
          if [ "$total_valid_count" -eq 0 ]; then
            echo -e "\n❌ 所有采集源均无有效rtp/udp地址，终止流程"
            rm -f "$all_valid_addrs"
            exit 0
          fi
          echo -e "\n====================================="
          echo "📥 所有源采集完成，总有效去重地址数：$total_valid_count 条"
          echo "====================================="

          new_ip_count=0
          declare -A region_en2cn=(
            ["Beijing"]="北京" ["Shanghai"]="上海" ["Tianjin"]="天津" ["Chongqing"]="重庆"
            ["Hebei"]="河北" ["Shanxi"]="山西" ["Inner Mongolia"]="内蒙古" ["Liaoning"]="辽宁"
            ["Jilin"]="吉林" ["Heilongjiang"]="黑龙江" ["Jiangsu"]="江苏" ["Zhejiang"]="浙江"
            ["Anhui"]="安徽" ["Fujian"]="福建" ["Jiangxi"]="江西" ["Shandong"]="山东"
            ["Henan"]="河南" ["Hubei"]="湖北" ["Hunan"]="湖南" ["Guangdong"]="广东"
            ["Guangxi"]="广西" ["Hainan"]="海南" ["Sichuan"]="四川" ["Guizhou"]="贵州"
            ["Yunnan"]="云南" ["Shaanxi"]="陕西" ["Gansu"]="甘肃" ["Qinghai"]="青海"
            ["Ningxia"]="宁夏" ["Xinjiang"]="新疆" ["Xizang"]="西藏" ["Hong Kong"]="香港" ["Macau"]="澳门"
            ["Shanxi"]="山西" ["Xianggang"]="香港" ["Aomen"]="澳门"
          )
          match_isp_by_api() {
            local isp_raw=$1
            isp_raw=$(echo "$isp_raw" | tr 'A-Z' 'a-z' || echo "")
            if [[ $isp_raw =~ unicom|cu|chinaunicom|china169 ]]; then
              echo "联通"
            elif [[ $isp_raw =~ mobile|cm|chinamobile ]]; then
              echo "移动"
            elif [[ $isp_raw =~ telecom|ct|chinatelecom|chinanet|netw ]]; then
              echo "电信"
            else
              echo "未知"
            fi
          }
          match_isp_by_regex() {
            local ip=$1
            if [[ $ip =~ ^(1[0-9]{2}|2[0-3]{2}|42|43|58|59|60|61|110|111|112|113|114|115|116|117|118|119|120|121|122|123|124|125|126|127|175|180|182|183|184|185|186|187|188|189|223)\. ]]; then
              echo "电信"
            elif [[ $ip =~ ^(42|43|58|59|60|61|110|111|112|113|114|115|116|117|118|119|120|121|122|123|124|125|126|127|175|180|182|183|184|185|186|187|188|189|223)\. ]]; then
              echo "联通"
            elif [[ $ip =~ ^(223|36|37|38|39|100|101|102|103|104|105|106|107|108|109|134|135|136|137|138|139|150|151|152|157|158|159|170|178|182|183|184|187|188|189)\. ]]; then
              echo "移动"
            else
              echo "未知"
            fi
          }
          # 归属地运营商查询（5层接口兜底）
          get_ip_info() {
            local ip=$1
            local info=""
            # 方案1：ip-api.com
            for i in {1..2}; do
              info=$(curl -s "http://ip-api.com/json/${ip}?lang=zh-CN" \
                -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" --connect-timeout 3 --max-time 8 2>/dev/null || true)
              if [ -n "$info" ] && echo "$info" | grep -q '"status":"success"'; then
                echo "$info"
                return 0
              fi
              sleep 1
            done
            # 方案2：api.ip.sb
            info=$(curl -s "https://api.ip.sb/geoip/$ip" \
              -A "Mozilla/5.0" --connect-timeout 3 --max-time 8 2>/dev/null || true)
            if [ -n "$info" ] && echo "$info" | grep -q '"region"'; then
              local region=$(echo "$info" | grep -o '"region":"[^"]*' | cut -d'"' -f4 || echo "未知")
              local isp=$(echo "$info" | grep -o '"isp":"[^"]*' | cut -d'"' -f4 || echo "未知")
              echo "{\"regionName\":\"${region}\",\"isp\":\"${isp}\"}"
              return 0
            fi
            # 方案3：ips.cn（国内接口，稳定）
            info=$(curl -s "https://api.ips.cn/api/ip?ip=$ip" \
              -A "Mozilla/5.0" --connect-timeout 3 --max-time 8 2>/dev/null || true)
            if [ -n "$info" ] && echo "$info" | grep -q '"ret":0'; then
              local region=$(echo "$info" | grep -o '"address":"[^"]*' | cut -d'"' -f4 | awk -F' ' '{print $1}' || echo "未知")
              local isp=$(echo "$info" | grep -o '"isp":"[^"]*' | cut -d'"' -f4 || echo "未知")
              echo "{\"regionName\":\"${region}\",\"isp\":\"${isp}\"}"
              return 0
            fi
            # 方案4：ip.cn（国内老牌，高可用）
            info=$(curl -s "https://ip.cn/api/index?ip=$ip&type=0" \
              -A "Mozilla/5.0" --connect-timeout 3 --max-time 8 2>/dev/null || true)
            if [ -n "$info" ] && echo "$info" | grep -q '"code":0'; then
              local region=$(echo "$info" | grep -o '"address":"[^"]*' | cut -d'"' -f4 | awk -F' ' '{print $1}' || echo "未知")
              local isp=$(echo "$info" | grep -o '"isp":"[^"]*' | cut -d'"' -f4 || echo "未知")
              echo "{\"regionName\":\"${region}\",\"isp\":\"${isp}\"}"
              return 0
            fi
            # 方案5：ipinfo.io（国际通用，兜底）
            info=$(curl -s "https://ipinfo.io/$ip/json" \
              -A "Mozilla/5.0" --connect-timeout 3 --max-time 8 2>/dev/null || true)
            if [ -n "$info" ] && echo "$info" | grep -q '"region"'; then
              local region=$(echo "$info" | grep -o '"region":"[^"]*' | cut -d'"' -f4 || echo "未知")
              local isp=$(echo "$info" | grep -o '"org":"[^"]*' | cut -d'"' -f4 || echo "未知")
              echo "{\"regionName\":\"${region}\",\"isp\":\"${isp}\"}"
              return 0
            fi
            # 所有接口均失败
            echo ""
            return 1
          }
          # 处理所有采集源的有效地址，严格校验白名单
          while IFS= read -r host_port; do
            [ -z "$host_port" ] && continue
            # 单个IP处理失败不影响整体，捕获所有错误
            (
              host="${host_port%%:*}"
              port="${host_port##*:}"
              [ -z "$host" ] || [ -z "$port" ] && { echo "❌ 地址格式错误，跳过：$host_port"; exit 0; }
              echo -e "\n🔧 开始处理：$host_port"
              # 域名解析（dig+nslookup双重兜底）
              if [[ "$host" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                query_ip="$host"
                write_addr="$host_port"
                echo "ℹ️  纯IP地址，直接使用：$query_ip"
              else
                # 优先dig解析
                query_ip=$(dig +short "$host" 2>/dev/null | head -n 1 | grep -E "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$" || echo "")
                # dig失败，切nslookup兜底
                if [ -z "$query_ip" ]; then
                  query_ip=$(nslookup "$host" 2>/dev/null | grep -E 'Address: [0-9]' | tail -n 1 | awk '{print $2}' | grep -E "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$" || echo "")
                fi
                write_addr="$host_port"
                if [ -z "$query_ip" ]; then
                  echo "❌ dig/nslookup均解析失败，跳过：$host_port"
                  exit 0
                fi
                echo "🌐 域名解析IP：$host → $query_ip"
              fi
              # 过滤内网IP
              if [[ "$query_ip" =~ ^(10\.|172\.1[6-9]\.|172\.2[0-9]\.|172\.3[0-1]\.|192\.168\.|22[4-9]\.|23[0-9]\.) ]]; then
                echo "❌ 内网/组播IP，跳过：$query_ip"
                exit 0
              fi
              # 获取归属地（多接口兜底）
              ip_info=$(get_ip_info "$query_ip")
              if [ -z "$ip_info" ]; then
                echo "❌ 所有归属地接口查询失败，跳过：$host_port"
                exit 0
              fi
              # 解析省份
              province=$(echo "$ip_info" | grep -o '"regionName":"[^"]*' | cut -d'"' -f4 || echo "未知")
              if [[ -v "region_en2cn[$province]" ]]; then
                province="${region_en2cn[$province]}"
                echo "ℹ️  英文省份转中文：$province"
              fi
              province=$(echo "$province" | sed -e 's/省//g' -e 's/市//g' -e 's/自治区//g' -e 's/特别行政区//g' || echo "未知")
              echo "ℹ️  清洗后省份：$province"
              if [ "$province" = "未知" ] || [ -z "$province" ]; then
                echo "⚠️  省份无效，跳过：$host_port"
                exit 0
              fi
              # 解析运营商
              isp_raw=$(echo "$ip_info" | grep -o '"isp":"[^"]*' | cut -d'"' -f4 || echo "未知")
              isp=$(match_isp_by_api "$isp_raw")
              echo "ℹ️  接口识别运营商：$isp（原始：$isp_raw）"
              if [ "$isp" = "未知" ]; then
                isp=$(match_isp_by_regex "$query_ip")
                echo "ℹ️  IP段兜底识别：$isp"
              fi
              if [ "$isp" = "未知" ]; then
                echo "❌ 运营商识别失败，跳过：$host_port"
                exit 0
              fi
              # 校验目标文件是否在初始白名单内
              target_filename="${province}${isp}.txt"
              target_file="./ip/$target_filename"
              # 1. 先校验文件名是否在白名单
              if [[ ! -v "existing_file_whitelist[$target_filename]" ]]; then
                echo "❌ 目标文件不在白名单，跳过：$target_filename（仓库无此文件，不新建）"
                exit 0
              fi
              # 2. 二次校验文件物理存在
              if [ ! -f "$target_file" ]; then
                echo "❌ 目标文件不存在，跳过：$target_filename"
                exit 0
              fi
              # 去重追加
              if ! grep -xFq "$write_addr" "$target_file" 2>/dev/null; then
                echo "$write_addr" >> "$target_file" 2>/dev/null && {
                  new_ip_count=$((new_ip_count + 1))
                  echo "✅  新增成功：$write_addr → $target_filename"
                } || {
                  echo "❌ 写入失败，跳过：$write_addr"
                }
              else
                echo "ℹ️  已存在，跳过：$write_addr → $target_filename"
              fi
              sleep 0.5 # 适当缩短休眠，提升执行效率
            ) || {
              echo "⚠️  处理 $host_port 异常，跳过该条"
              continue
            }
          done < "$all_valid_addrs"

          # 清理临时文件
          rm -f "$all_valid_addrs"
          # 仅对初始白名单内的文件去重排序
          for file in "${existing_files[@]}"; do
            sort -u "$file" -o "$file" 2>/dev/null || echo "⚠️  排序 $file 失败，跳过"
          done
          # 输出统计
          echo -e "\n====================================="
          echo "📊 多源IP(rtp/udp) 更新统计"
          echo "新增有效地址总数: $new_ip_count 条"
          echo "====================================="
          echo "更新文件列表（仅展示有新增的）:"
          for file in "${existing_files[@]}"; do
            final_count=$(wc -l < "$file" 2>/dev/null || echo 0)
            initial_count=${initial_counts["$file"]:-0}
            added=$((final_count - initial_count))
            if [ $added -gt 0 ]; then
              echo "  - $(basename "$file"): +$added 条"
            fi
          done
          echo "====================================="
      - name: 提交并推送所有IP同步更新
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ip/
          if git diff --staged --quiet; then
            echo "✅ 无IP更新，无需提交"
          else
            commit_msg=$( [ "${{ github.event_name }}" == "workflow_dispatch" ] && echo "手动触发-多源rtp/udp IP同步更新" || echo "定时触发-多源rtp/udp IP同步更新" )
            git commit -m "$commit_msg"
            git push
            echo "✅ 已提交推送所有IP更新"
          fi
