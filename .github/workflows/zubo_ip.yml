name: zubo_ip
on:
  schedule:
    # FOFA任务1：UTC 16:00 触发（北京时间次日00:00）
    - cron: '0 16 * * *'
    # FOFA任务2：UTC 18:00 触发（北京时间次日02:00）
    - cron: '0 18 * * *'
    # IP同步任务：UTC 17:00 触发（北京时间次日01:00）
    - cron: '0 17 * * *'
  workflow_dispatch:       # 手动触发，可选择执行全部/指定任务
    inputs:
      run_fofa1:
        description: 是否执行FOFA任务1
        type: boolean
        default: false
      run_fofa2:
        description: 是否执行FOFA任务2
        type: boolean
        default: true
      run_ip_sync:
        description: 是否执行原IP同步（kakaxi/TV-yjc/iptvz）
        type: boolean
        default: true
jobs:
  ip-fofa-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      # ==============================================
      # 可扩展FOFA爬取模块 - 任务1（固定：四川电信）
      # ==============================================
      - name: FOFA爬取-任务1
        if: github.event.schedule.cron == '0 16 * * *' || github.event.inputs.run_fofa1 == 'true'
        env:
          # FOFA链接1（base64查询语句）
          FOFA_URL: "https://fofa.info/result?qbase64=InVkcHh5IiAmJiBjb3VudHJ5PSJDTiIgJiYgcmVnaW9uPSJTaWNodWFuIiAmJiBvcmc9IkNoaW5hbmV0Igo="
          FOFA_DESC: "FOFA链接1"
          FIXED_PROVINCE: "四川"  # 固定省份
          FIXED_ISP: "电信"       # 固定运营商
        run: |
          echo "📡 开始执行${{ env.FOFA_DESC }}爬取（固定归属：${{ env.FIXED_PROVINCE }}${{ env.FIXED_ISP }}）"
          # 创建ip目录
          mkdir -p ip
          # 爬取FOFA页面提取IP:PORT 并去行尾引号
          all_ips=$(curl -sL --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --referer "https://fofa.info/" ${{ env.FOFA_URL }} | grep -oE '<a href="http://([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+)"' | cut -d'/' -f3 | sed 's/"$//' | sort -u)
          if [ -z "$all_ips" ]; then
            echo "❌ 未爬取到任何IP，跳过后续处理"
            exit 0
          fi
          crawl_count=$(echo "$all_ips" | wc -l)
          echo "✅ 初步爬取到IP数量：$crawl_count 个"
          
          total_new=0
          target_file="ip/${{ env.FIXED_PROVINCE }}${{ env.FIXED_ISP }}.txt"
          touch "$target_file"
          
          # 直接写入固定归属文件，实时统计新增，不重复去重
          while IFS= read -r ip_port; do
            if ! grep -xFq "$ip_port" "$target_file" 2>/dev/null; then
              echo "$ip_port" >> "$target_file"
              total_new=$((total_new + 1))  # 实时计数，准确统计本次新增
            fi
          done <<< "$all_ips"
          
          # 循环结束后统一去重排序，只执行一次
          sort -u "$target_file" -o "$target_file"
          
          # 统计并输出更新日志（和原IP同步格式一致）
          echo "====================================="
          echo "📊 ${{ env.FOFA_DESC }} IP 更新统计"
          echo "爬取IP总数: $crawl_count 条"
          echo "固定写入文件: $(basename "$target_file")"
          echo "更新文件列表:"
          if [ $total_new -gt 0 ]; then
            echo "  - $(basename "$target_file"): +$total_new 条"
          else
            echo "  - 无新增IP"
          fi
          echo "新增IP总数: $total_new 条"
          echo "====================================="
          echo "🎉 ${{ env.FOFA_DESC }}爬取完成，已写入${{ env.FIXED_PROVINCE }}${{ env.FIXED_ISP }}.txt"
      # ==============================================
      # 可扩展FOFA爬取模块 - 任务2（固定：北京市联通）
      # ==============================================
      - name: FOFA爬取-任务2
        if: github.event.schedule.cron == '0 18 * * *' || github.event.inputs.run_fofa2 == 'true'
        env:
          # FOFA链接2（base64查询语句）
          FOFA_URL: "https://fofa.info/result?qbase64=InVkcHh5IiAmJiBjb3VudHJ5PSJDTiIgJiYgcmVnaW9uPSJCZWlqaW5nIiAmJiBvcmc9IkNoaW5hIFVuaWNvbSBCZWlqaW5nIFByb3ZpbmNlIE5ldHdvcmsi"
          FOFA_DESC: "FOFA链接2"
          FIXED_PROVINCE: "北京市"  # 固定省份
          FIXED_ISP: "联通"         # 固定运营商
        run: |
          echo "📡 开始执行${{ env.FOFA_DESC }}爬取（固定归属：${{ env.FIXED_PROVINCE }}${{ env.FIXED_ISP }}）"
          # 创建ip目录
          mkdir -p ip
          # 爬取FOFA页面提取IP:PORT 并去行尾引号
          all_ips=$(curl -sL --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
            --referer "https://fofa.info/" ${{ env.FOFA_URL }} | grep -oE '<a href="http://([0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}:[0-9]+)"' | cut -d'/' -f3 | sed 's/"$//' | sort -u)
          if [ -z "$all_ips" ]; then
            echo "❌ 未爬取到任何IP，跳过后续处理"
            exit 0
          fi
          crawl_count=$(echo "$all_ips" | wc -l)
          echo "✅ 初步爬取到IP数量：$crawl_count 个"
          
          total_new=0
          target_file="ip/${{ env.FIXED_PROVINCE }}${{ env.FIXED_ISP }}.txt"
          touch "$target_file"
          
          # 直接写入固定归属文件，实时统计新增，不重复去重
          while IFS= read -r ip_port; do
            if ! grep -xFq "$ip_port" "$target_file" 2>/dev/null; then
              echo "$ip_port" >> "$target_file"
              total_new=$((total_new + 1))  # 实时计数，准确统计本次新增
            fi
          done <<< "$all_ips"
          
          # 循环结束后统一去重排序，只执行一次
          sort -u "$target_file" -o "$target_file"
          
          # 统计并输出更新日志（和原IP同步格式一致）
          echo "====================================="
          echo "📊 ${{ env.FOFA_DESC }} IP 更新统计"
          echo "爬取IP总数: $crawl_count 条"
          echo "固定写入文件: $(basename "$target_file")"
          echo "更新文件列表:"
          if [ $total_new -gt 0 ]; then
            echo "  - $(basename "$target_file"): +$total_new 条"
          else
            echo "  - 无新增IP"
          fi
          echo "新增IP总数: $total_new 条"
          echo "====================================="
          echo "🎉 ${{ env.FOFA_DESC }}爬取完成，已写入${{ env.FIXED_PROVINCE }}${{ env.FIXED_ISP }}.txt"
      # ==============================================
      # 原IP同步任务1：从kakaxi下载并解析IPTV
      # ==============================================
      - name: 原IP同步-1. 从kakaxi下载并解析 IPTV
        if: github.event.schedule.cron == '0 17 * * *' || github.event.inputs.run_ip_sync == 'true'
        run: |
          declare -A initial_counts
          for file in ./ip/*.txt; do
            [ -f "$file" ] && initial_counts["$file"]=$(wc -l < "$file") || initial_counts["$file"]=0
          done
          curl -L https://github.com/kakaxi-1/IPTV/raw/refs/heads/main/iptv.txt -o iptv.txt
          CITY_LIST="北京 上海 天津 重庆"
          new_ip_count=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            url_part="${line%%$*}"
            label_part="${line##*$}"
            if [[ $url_part =~ ([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+) ]]; then
              ip_port="${BASH_REMATCH[1]}"
            else
              continue
            fi
            if [[ $label_part =~ ([^0-9]+)[0-9]+$ ]]; then
              province_operator="${BASH_REMATCH[1]}"
            else
              province_operator="$label_part"
            fi
            if [[ $province_operator =~ (.*)(电信|移动|联通) ]]; then
              province_part="${BASH_REMATCH[1]}"
              operator="${BASH_REMATCH[2]}"
            else
              continue
            fi
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              target_province="${province_part}市"
            else
              target_province="$province_part"
            fi
            target_file="./ip/${target_province}${operator}.txt"
            touch "$target_file"
            if ! grep -xFq "$ip_port" "$target_file"; then
              echo "$ip_port" >> "$target_file"
              new_ip_count=$((new_ip_count + 1))
            fi
            sort -u "$target_file" -o "$target_file"
          done < iptv.txt
          rm -f iptv.txt
          echo "====================================="
          echo "📊 kakaxi IP 更新统计"
          echo "新增IP总数: $new_ip_count 条"
          echo "更新文件列表:"
          for file in ./ip/*.txt; do
            [ -f "$file" ] || continue
            final_count=$(wc -l < "$file")
            initial_count=${initial_counts["$file"]}
            added=$((final_count - initial_count))
            if [ $added -gt 0 ]; then
              echo "  - $(basename "$file"): +$added 条"
            fi
          done
          echo "====================================="
      # ==============================================
      # 原IP同步任务2：从 TV-yjc 同步IP（不覆盖）
      # ==============================================
      - name: 原IP同步-2. 从 TV-yjc 同步IP（不覆盖）
        if: github.event.schedule.cron == '0 17 * * *' || github.event.inputs.run_ip_sync == 'true'
        run: |
          # 先把当前状态暂存，用于后续对比
          git add ip/
          git diff --staged > before.patch
          # 执行同步逻辑
          git clone --depth 1 https://github.com/adminouyang/TV-yjc.git temp-tvyjc
          mkdir -p ip
          cd ip
          while read src_file; do
            filename=$(basename "$src_file")
            dest="$filename"
            echo "正在处理: $filename"
            if [ -f "$dest" ]; then
              grep -xFf "$dest" "$src_file" -v >> "$dest" || true
              awk '!seen[$0]++' "$dest" > "$dest.tmp" && mv "$dest.tmp" "$dest"
            else
              cp "$src_file" .
            fi
            sed -i '/^[[:space:]]*#/d' "$dest"
            sed -i '/无可用IP/d' "$dest"
          done < <(find ../temp-tvyjc/IP_Scan/result_ip -type f -name "*.txt")
          rm -rf ../temp-tvyjc
          cd ..
          # 统计 Git 实际新增的行数（修复排序 + 文件名显示）
          echo "====================================="
          echo "📊 TV-yjc IP 更新统计"
          git add ip/
          git diff --staged > after.patch
          # 排序 before/after 的 + 行，避免 comm 报错
          before_plus=$(grep -E '^\+' before.patch | grep -v '^\+\++' | sort)
          after_plus=$(grep -E '^\+' after.patch | grep -v '^\+\++' | sort)
          total_added=$(comm -13 <(echo "$before_plus") <(echo "$after_plus") | wc -l)
          echo "新增IP总数: $total_added 条"
          echo "更新文件列表:"
          # 提取文件名并统计
          comm -13 <(echo "$before_plus") <(echo "$after_plus") | \
            sed -E 's/^\+([^:]+):.*/\1/' | \
            sort | uniq -c | while read count file; do
              if [ "$count" -gt 0 ]; then
                echo "  - $(basename "$file"): +$count 条"
              fi
            done
          echo "====================================="
          # 清理补丁文件
          rm -f before.patch after.patch
      # ==============================================
      # 原IP同步任务3：从 iptvz 同步电信/联通IP
      # ==============================================
      - name: 原IP同步-3. 从 iptvz 同步电信/联通IP
        if: github.event.schedule.cron == '0 17 * * *' || github.event.inputs.run_ip_sync == 'true'
        run: |
          declare -A initial_counts
          for file in ./ip/*.txt; do
            [ -f "$file" ] && initial_counts["$file"]=$(wc -l < "$file") || initial_counts["$file"]=0
          done
          git clone --depth 1 https://github.com/q1017673817/iptvz.git temp-iptvz
          mkdir -p ip
          cd ip
          CITY_LIST="北京 天津 上海 重庆"
          total_added=0
          declare -A file_added
          while read src_file; do
            filename=$(basename "$src_file")
            base="${filename/_ip.txt/}"
            province_part="${base:0:2}"
            operator_part="${base:2}"
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              target_province="${province_part}市"
            else
              target_province="$province_part"
            fi
            dest="${target_province}${operator_part}.txt"
            echo "处理: $filename → $dest"
            temp_file=$(mktemp)
            grep -E "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+" "$src_file" > "$temp_file"
            if [ -f "$dest" ]; then
              added_lines=$(grep -xFf "$dest" "$temp_file" -v | wc -l)
              grep -xFf "$dest" "$temp_file" -v >> "$dest" || true
              awk '!seen[$0]++' "$dest" > "$dest.tmp" && mv "$dest.tmp" "$dest"
            else
              cp "$temp_file" "$dest"
              added_lines=$(wc -l < "$dest")
            fi
            rm -f "$temp_file"
            if [ $added_lines -gt 0 ]; then
              file_added["$dest"]=$added_lines
              total_added=$((total_added + added_lines))
            fi
          done < <(find ../temp-iptvz/ip -type f -name "*联通_ip.txt" -o -name "*电信_ip.txt" | grep -v "存档_")
          rm -rf ../temp-iptvz
          cd ..
          echo "====================================="
          echo "📊 iptvz IP 更新统计"
          echo "新增IP总数: $total_added 条"
          echo "更新文件列表:"
          for file in "${!file_added[@]}"; do
            echo "  - $file: +${file_added[$file]} 条"
          done
          echo "====================================="
      # ==============================================
      # 统一提交推送（FOFA+IP同步的所有更新）
      # ==============================================
      - name: 提交并推送所有IP更新
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ip/
          if git diff --staged --quiet; then
            echo "✅ 无新IP/FOFA更新，无需提交"
          else
            if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
              commit_msg="手动触发-FOFA爬取+kakaxi/TV-yjc/iptvz IP更新"
            else
              commit_msg="定时触发-FOFA爬取+kakaxi/TV-yjc/iptvz IP更新"
            fi
            git commit -m "$commit_msg"
            git push
            echo "✅ 已合并提交FOFA+所有IP更新到仓库"
          fi
