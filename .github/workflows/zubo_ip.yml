name: zubo_ip
on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:
jobs:
  ip-sync-all:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: IP同步-1. 从kakaxi下载并解析 IPTV
        run: |
          # 仅获取现有ip目录下的文件，初始化统计
          declare -A initial_counts
          existing_files=()
          for file in ./ip/*.txt; do
            [ -f "$file" ] && {
              initial_counts["$file"]=$(wc -l < "$file")
              existing_files+=("$file")
            }
          done
          # 无现有文件则直接退出
          [ ${#existing_files[@]} -eq 0 ] && echo "⚠️ ip目录下无现有文件，跳过kakaxi同步" && exit 0
          
          curl -L https://github.com/kakaxi-1/IPTV/raw/refs/heads/main/iptv.txt -o iptv.txt
          new_ip_count=0
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            url_part="${line%%$*}"
            label_part="${line##*$}"
            # 提取IP:PORT
            if [[ $url_part =~ ([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+) ]]; then
              ip_port="${BASH_REMATCH[1]}"
            else
              continue
            fi
            # 解析省份和运营商
            if [[ $label_part =~ ([^0-9]+)[0-9]+$ ]]; then
              province_operator="${BASH_REMATCH[1]}"
            else
              province_operator="$label_part"
            fi
            if [[ $province_operator =~ (.*)(电信|移动|联通) ]]; then
              province_part="${BASH_REMATCH[1]}"
              operator="${BASH_REMATCH[2]}"
            else
              continue
            fi
            # 统一清洗省份名
            target_province=$(echo "$province_part" | sed -e 's/省//g' -e 's/市//g' -e 's/自治区//g' -e 's/特别行政区//g')
            target_file="./ip/${target_province}${operator}.txt"
            # 核心：仅处理已存在的文件
            [ -f "$target_file" ] || continue
            # 去重追加IP
            if ! grep -xFq "$ip_port" "$target_file"; then
              echo "$ip_port" >> "$target_file"
              new_ip_count=$((new_ip_count + 1))
            fi
            sort -u "$target_file" -o "$target_file"
          done < iptv.txt
          rm -f iptv.txt
          # 输出统计
          echo "====================================="
          echo "📊 kakaxi IP 更新统计"
          echo "新增IP总数: $new_ip_count 条"
          echo "更新文件列表:"
          for file in "${existing_files[@]}"; do
            final_count=$(wc -l < "$file")
            initial_count=${initial_counts["$file"]}
            added=$((final_count - initial_count))
            [ $added -gt 0 ] && echo "  - $(basename "$file"): +$added 条"
          done
          echo "====================================="
      - name: IP同步-2. 从 TV-yjc 同步IP
        run: |
          # 仅获取现有ip目录下的文件
          existing_files=()
          for file in ./ip/*.txt; do
            [ -f "$file" ] && existing_files+=("$file")
          done
          [ ${#existing_files[@]} -eq 0 ] && echo "⚠️ ip目录下无现有文件，跳过TV-yjc同步" && exit 0
          
          git clone --depth 1 https://github.com/adminouyang/TV-yjc.git temp-tvyjc
          # 初始化统计
          declare -A file_added
          total_added=0
          # 遍历源文件，仅匹配现有目标文件
          while read src_file; do
            filename=$(basename "$src_file")
            # 清洗源文件名省份
            clean_filename=$(echo "$filename" | sed -e 's/省//g' -e 's/市//g' -e 's/自治区//g' -e 's/特别行政区//g')
            dest="./ip/${clean_filename}"
            # 核心：仅处理已存在的文件
            [ -f "$dest" ] || continue
            # 记录处理前行数
            before=$(wc -l < "$dest")
            # 去重合并IP
            grep -xFf "$dest" "$src_file" -v >> "$dest" || true
            awk '!seen[$0]++' "$dest" > "$dest.tmp" && mv "$dest.tmp" "$dest"
            # 清理无效内容
            sed -i '/^[[:space:]]*#/d' "$dest"
            sed -i '/无可用IP/d' "$dest"
            # 统计新增
            after=$(wc -l < "$dest")
            added=$((after - before))
            if [ $added -gt 0 ]; then
              file_added["$(basename "$dest")"]=$added
              total_added=$((total_added + added))
            fi
          done < <(find ./temp-tvyjc/IP_Scan/result_ip -type f -name "*.txt")
          # 清理临时文件
          rm -rf ./temp-tvyjc
          # 输出统计
          echo "====================================="
          echo "📊 TV-yjc IP 更新统计"
          echo "新增IP总数: $total_added 条"
          echo "更新文件列表:"
          for file in "${!file_added[@]}"; do
            echo "  - $file: +${file_added[$file]} 条"
          done
          echo "====================================="
      - name: IP同步-3. 从 iptvz 同步电信/联通IP
        run: |
          # 仅获取现有ip目录下的文件，初始化统计
          declare -A initial_counts
          existing_files=()
          for file in ./ip/*.txt; do
            [ -f "$file" ] && {
              initial_counts["$file"]=$(wc -l < "$file")
              existing_files+=("$file")
            }
          done
          [ ${#existing_files[@]} -eq 0 ] && echo "⚠️ ip目录下无现有文件，跳过iptvz同步" && exit 0
          
          git clone --depth 1 https://github.com/q1017673817/iptvz.git temp-iptvz
          total_added=0
          declare -A file_added
          # 遍历源文件（仅电信/联通，排除存档）
          while read src_file; do
            filename=$(basename "$src_file")
            base="${filename/_ip.txt/}"
            province_part="${base:0:2}"
            operator_part="${base:2}"
            # 统一清洗省份名
            target_province=$(echo "$province_part" | sed -e 's/省//g' -e 's/市//g' -e 's/自治区//g' -e 's/特别行政区//g')
            target_file="./ip/${target_province}${operator_part}.txt"
            # 核心：仅处理已存在的文件
            [ -f "$target_file" ] || continue
            # 过滤有效IP
            temp_file=$(mktemp)
            grep -E "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+" "$src_file" > "$temp_file"
            [ ! -s "$temp_file" ] && rm -f "$temp_file" && continue
            # 去重追加
            before=$(wc -l < "$target_file")
            grep -xFf "$target_file" "$temp_file" -v >> "$target_file" || true
            awk '!seen[$0]++' "$target_file" > "$target_file.tmp" && mv "$target_file.tmp" "$target_file"
            # 统计新增
            after=$(wc -l < "$target_file")
            added_lines=$((after - before))
            rm -f "$temp_file"
            if [ $added_lines -gt 0 ]; then
              file_added["$(basename "$target_file")"]=$added_lines
              total_added=$((total_added + added_lines))
            fi
          done < <(find ./temp-iptvz/ip -type f -name "*联通_ip.txt" -o -name "*电信_ip.txt" | grep -v "存档_")
          # 清理临时文件
          rm -rf ./temp-iptvz
          # 输出统计
          echo "====================================="
          echo "📊 iptvz IP 更新统计"
          echo "新增IP总数: $total_added 条"
          echo "更新文件列表:"
          for file in "${!file_added[@]}"; do
            echo "  - $file: +${file_added[$file]} 条"
          done
          echo "====================================="
      - name: 提交并推送所有IP同步更新
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add ip/
          if git diff --staged --quiet; then
            echo "✅ 无kakaxi/TV-yjc/iptvz IP更新，无需提交"
          else
            commit_msg=$( [ "${{ github.event_name }}" == "workflow_dispatch" ] && echo "手动触发-kakaxi/TV-yjc/iptvz IP同步更新" || echo "定时触发-kakaxi/TV-yjc/iptvz IP同步更新" )
            git commit -m "$commit_msg"
            git push
            echo "✅ 已提交推送所有IP同步更新"
          fi
