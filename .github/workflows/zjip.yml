name: ZJIP 

on:
  schedule:
    - cron: '0 18 * *'  
  workflow_dispatch:       # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 我的仓库 (zubo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 克隆源仓库 TV-yjc
        run: |
          git clone --depth 1 https://github.com/adminouyang/TV-yjc.git temp-tvyjc

      - name: 批量追加并清洗所有 IP 文件
        run: |
          # 定义需要加“市”字的直辖市列表
          CITY_LIST="北京 上海 天津 重庆"

          # 遍历源仓库中所有 *_ip.txt 文件
          for src_file in temp-tvyjc/my_tv/ip/*_ip.txt; do
            # 提取文件名（如 北京联通_ip.txt）
            filename=$(basename "$src_file")
            # 去掉 _ip.txt 后缀，得到 北京联通
            base=${filename%_ip.txt}
            
            # 分离省份和运营商（按最后一个“电信/移动/联通”分割）
            if [[ $base =~ (.*)(电信|移动|联通) ]]; then
              province_part="${BASH_REMATCH[1]}"
              operator="${BASH_REMATCH[2]}"
            else
              province_part="$base"
              operator=""
            fi

            # 判断是否为直辖市，决定是否加“市”字
            if echo " $CITY_LIST " | grep -q " $province_part "; then
              # 直辖市：北京 → 北京市
              target_province="${province_part}市"
            else
              # 其他省份：云南 → 云南
              target_province="$province_part"
            fi

            # 拼接目标文件名
            target_file="./ip/${target_province}${operator}.txt"

            # 如果目标文件不存在，先创建空文件
            touch "$target_file"

            # 清洗源文件内容：只保留 IP:端口，去掉速度字段
            awk '{print $1}' "$src_file" >> "$target_file"

            # 去重：保留唯一的 IP 记录
            sort -u "$target_file" -o "$target_file"
          done

          # 清理临时克隆目录
          rm -rf temp-tvyjc

      - name: 提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip/
          git commit -m "Auto append & clean all IP files from TV-yjc (correct naming)" || echo "No changes to commit"
          git push
