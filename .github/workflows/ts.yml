name: tuisong

on:
  workflow_run:
    workflows: ["zubo"]  # 这里要改！
    types:
      - completed
  workflow_dispatch:  # 保留手动触发选项

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}  # 仅主任务成功后才执行
    steps:
      - name: Checkout 源仓库 (zuo)
        uses: actions/checkout@v4
        with:
          path: source
          fetch-depth: 1

      - name: Checkout 目标仓库 (lisa3456.github.io)
        uses: actions/checkout@v4
        with:
          repository: lisa3456/lisa3456.github.io
          token: ${{ secrets.TARGET_REPO_TOKEN }}
          path: target
          fetch-depth: 1

      - name: 复制 IPTV.txt 到 Pages 仓库
        run: |
          if [ -f "source/IPTV.txt" ]; then
            cp -f source/IPTV.txt target/
            echo "✅ 成功复制 IPTV.txt"
          else
            echo "❌ 源仓库中未找到 IPTV.txt，跳过同步"
            exit 0
          fi

      - name: 提交并推送到 GitHub Pages
        working-directory: target
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add IPTV.txt
          git commit -m "chore: sync IPTV.txt from zuo repo" || echo "⚠️ 无文件变更，无需提交"
          git push origin main
