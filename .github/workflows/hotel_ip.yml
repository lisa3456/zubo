name: hotel_ip 
on:
  schedule:
    - cron: '0 22 1,16 * *'
  workflow_dispatch:
jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install pysocks
        
      - name: 提取ip_port（新增FOFA搜索iptv/live/相关IP）
        run: |
          cat > hotel_ip_port.py << 'EOF'
          import requests
          import re
          import os
          import random
          import time
          import json
          import socket
          import threading
          import math
          from urllib.parse import urlparse, urljoin
          from concurrent.futures import ThreadPoolExecutor, as_completed
          
          # FOFA配置 - 搜索iptv/live/zh_cn.js相关，提取IP:端口（适配原有1000.json接口）
          FOFA_URL = "https://fofa.info/result?qbase64=ImlwdHYvbGl2ZS96aF9jbi5qcyIgJiYgY291bnRyeT0iQ04i"
          FOFA_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
              "Referer": "https://fofa.info/",
              "Accept-Language": "zh-CN,zh;q=0.9"
          }
          # 测速配置项【仅保留基础配置，取消所有耗时阈值】
          DETECT_TIMEOUT = 8    # 单分片最大下载硬超时（秒）
          TEST_TS_NUM = 3       # 测试分片数
          COST_DEV_THRESH = 1.5 # 耗时波动参考值（仅统计，不判定）
          MIN_CHUNK_SIZE = 512  # 最小有效分片大小（字节）
          
          # 请求头设置
          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': '*/*',
              'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
              'Connection': 'keep-alive',
              'Accept-Encoding': 'gzip, deflate',
          }
          
          def fofa_crawl_ip():
              """从FOFA搜索iptv/live/相关，提取公网IP:端口（适配原有1000.json接口）"""
              ip_port_set = set()
              print("【FOFA爬取】开始搜索iptv/live/相关IP:端口...")
              try:
                  resp = requests.get(FOFA_URL, headers=FOFA_HEADERS, timeout=20, verify=False)
                  if resp.status_code != 200:
                      print(f"【FOFA爬取】请求失败，状态码: {resp.status_code}")
                      return ip_port_set
                  # 匹配FOFA页面中的http://IP:PORT链接，与原有提取规则一致
                  ip_port_matches = re.findall(r'<a href="http://([\d\.]+:\d+)"', resp.text)
                  if not ip_port_matches:
                      print("【FOFA爬取】未匹配到任何IP:端口")
                      return ip_port_set
                  # 过滤内网IP，保留公网IP，与原有过滤规则完全一致
                  for ip_port in ip_port_matches:
                      ip = ip_port.split(':')[0]
                      if not ip.startswith(('10.', '172.16.', '192.168.', '127.', '169.254.')):
                          ip_port_set.add(ip_port)
                  print(f"【FOFA爬取】完成，提取到公网IP:端口共 {len(ip_port_set)} 个")
              except Exception as e:
                  print(f"【FOFA爬取】异常: {str(e)[:50]}")
              return ip_port_set
          
          def check_tcp_connection(ip, port, timeout=3):
              """测试TCP连接是否可用"""
              try:
                  sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  sock.settimeout(timeout)
                  result = sock.connect_ex((ip, int(port)))
                  sock.close()
                  return result == 0
              except:
                  return False
          
          def check_ip_availability(ip_port, timeout=5):
              """检测IP:端口是否可用（完全保留原有逻辑，适配1000.json接口）"""
              try:
                  ip, port = ip_port.split(':')
                  
                  # 先测试TCP连接
                  if not check_tcp_connection(ip, port, timeout=2):
                      print(f"  {ip_port}: TCP连接失败")
                      return False, None
                  
                  print(f"  {ip_port}: TCP连接成功")
                  
                  # 完全保留原有测试接口，无任何新增
                  test_urls = [
                      f"http://{ip_port}/iptv/live/1000.json?key=txiptv",
                      f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt",
                      f"http://{ip_port}/",
                      f"http://{ip_port}/iptv/live/",
                      f"http://{ip_port}/ZHGXTV/Public/json/"
                  ]
                  
                  session = requests.Session()
                  
                  for url in test_urls:
                      try:
                          response = session.get(url, timeout=timeout, headers=HEADERS, verify=False)
                          print(f"  {ip_port}: 尝试 {url} - 状态码: {response.status_code}")
                          
                          if response.status_code == 200:
                              content_type = response.headers.get('Content-Type', '')
                              content = response.text[:100]
                              
                              if "1000.json" in url or "json" in content_type.lower():
                                  try:
                                      json_data = response.json()
                                      if "data" in json_data or "code" in json_data:
                                          print(f"  {ip_port}: JSON接口可用")
                                          return True, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                                  except:
                                      pass
                              
                              if "live_interface.txt" in url or "txt" in content_type.lower() or ("CCTV" in content and "," in content):
                                  print(f"  {ip_port}: TXT接口可用")
                                  return True, f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                              
                              if response.status_code == 200 and len(response.content) > 0:
                                  print(f"  {ip_port}: HTTP服务可用 (URL: {url})")
                                  if "iptv" in url:
                                      return True, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                                  elif "ZHGXTV" in url:
                                      return True, f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                                  else:
                                      return True, url
                                      
                      except requests.exceptions.ConnectionError:
                          continue
                      except requests.exceptions.Timeout:
                          continue
                      except Exception as e:
                          continue
                  
                  print(f"  {ip_port}: 所有接口测试失败")
                  return False, None
                  
              except Exception as e:
                  print(f"  {ip_port}: 检测异常 - {str(e)[:50]}")
                  return False, None
          
          def hotel_channels_from_ip_port(ip_port, interface_url):
              """从IP:端口的接口解析频道信息（完全保留原有逻辑）"""
              hotel_channels = []
              try:
                  response = requests.get(interface_url, timeout=10, headers=HEADERS, verify=False)
                  
                  if "iptv" in interface_url or "json" in interface_url:
                      try:
                          json_data = response.json()
                          if isinstance(json_data, dict):
                              if "data" in json_data and isinstance(json_data["data"], list):
                                  for item in json_data["data"]:
                                      if isinstance(item, dict):
                                          name = item.get('name', '') or item.get('channel_name', '') or item.get('title', '')
                                          urlx = item.get('url', '') or item.get('urlx', '') or item.get('stream_url', '')
                                          if name and urlx:
                                              if not urlx.startswith('/'):
                                                  urlx = '/' + urlx
                                              urld = f"http://{ip_port}{urlx}"
                                              hotel_channels.append((name, urld))
                          elif isinstance(json_data, list):
                              for item in json_data:
                                  if isinstance(item, dict):
                                      name = item.get('name', '') or item.get('channel_name', '') or item.get('title', '')
                                      urlx = item.get('url', '') or item.get('urlx', '') or item.get('stream_url', '')
                                      if name and urlx:
                                          if not urlx.startswith('/'):
                                              urlx = '/' + urlx
                                              urld = f"http://{ip_port}{urlx}"
                                              hotel_channels.append((name, urld))
                      except json.JSONDecodeError:
                          pass
                  
                  content = response.text
                  lines = content.split('\n')
                  for line in lines:
                      line = line.strip()
                      if not line or line.startswith('#') or ',' not in line:
                          continue
                      parts = line.split(',', 1)
                      if len(parts) < 2:
                          continue
                      name = parts[0].strip()
                      full_url = parts[1].strip()
                      parsed_url = urlparse(full_url)
                      path = parsed_url.path
                      if parsed_url.query:
                          path += '?' + parsed_url.query
                      urld = f"http://{ip_port}{path}"
                      hotel_channels.append((name, urld))
                  
                  if not hotel_channels and "CCTV" in content and ("m3u8" in content or ".ts" in content):
                      pattern = r'([^,]+?CCTV[^,]*?),([^\s]+)'
                      matches = re.findall(pattern, content)
                      for name, url in matches:
                          parsed_url = urlparse(url.strip())
                          path = parsed_url.path
                          if parsed_url.query:
                              path += '?' + parsed_url.query
                          urld = f"http://{ip_port}{path}"
                          hotel_channels.append((name.strip(), urld))
                  
                  return hotel_channels
              except Exception as e:
                  print(f"解析频道错误 {interface_url}: {e}")
                  return []
          
          def calculate_standard_deviation(data):
              """计算列表标准差（衡量耗时波动）"""
              if len(data) < 2:
                  return 0.0
              mean = sum(data) / len(data)
              variance = sum((x - mean) ** 2 for x in data) / len(data)
              return math.sqrt(variance)
          
          def smart_ts_detection(channel_url):
              """智能TS分片检测 - 仅统计下载耗时，无阈值判定"""
              try:
                  session = requests.Session()
                  session.headers.update(HEADERS)
                  session.mount('http://', requests.adapters.HTTPAdapter(max_retries=2))
                  session.mount('https://', requests.adapters.HTTPAdapter(max_retries=2))
                  
                  m3u8_resp = session.get(channel_url, timeout=5, verify=False)
                  if m3u8_resp.status_code != 200:
                      try:
                          start = time.time()
                          stream_resp = session.get(channel_url, timeout=DETECT_TIMEOUT, stream=True, verify=False)
                          if stream_resp.status_code == 200:
                              bytes_downloaded = 0
                              for chunk in stream_resp.iter_content(chunk_size=8192):
                                  if chunk:
                                      bytes_downloaded += len(chunk)
                                      if time.time() - start >= DETECT_TIMEOUT:
                                          break
                              if bytes_downloaded < MIN_CHUNK_SIZE:
                                  return False, [], 0.0, 0.0, []
                              cost = round(time.time() - start, 2)
                              return True, [channel_url], cost, 0.0, [cost]
                      except:
                          pass
                      return False, [], 0.0, 0.0, []
                  
                  m3u8_content = m3u8_resp.text
                  base_url = channel_url.rsplit('/', 1)[0] + '/' if '/' in channel_url else channel_url + '/'
                  
                  def extract_all_ts(content, current_base):
                      ts_list = []
                      for line in content.strip().split('\n'):
                          line = line.strip()
                          if not line or line.startswith('#'):
                              continue
                          if line.endswith('.ts') or '.ts?' in line:
                              ts_list.append(line if line.startswith('http') else current_base + line)
                          elif line.endswith('.m3u8'):
                              try:
                                  nested_url = line if line.startswith('http') else current_base + line
                                  nested_resp = session.get(nested_url, timeout=3, verify=False)
                                  if nested_resp.status_code == 200:
                                      ts_list.extend(extract_all_ts(nested_resp.text, nested_url.rsplit('/', 1)[0] + '/'))
                              except:
                                  pass
                      return ts_list
                  
                  ts_urls = extract_all_ts(m3u8_content, base_url)
                  if not ts_urls:
                      return True, [channel_url], 1.0, 0.0, [1.0]
                  
                  ts_costs = []
                  total_start = time.time()
                  
                  # 遍历测试前N个分片，完整下载并记录耗时
                  for ts_url in ts_urls[:TEST_TS_NUM]:
                      if time.time() - total_start >= DETECT_TIMEOUT * TEST_TS_NUM:
                          break
                      try:
                          start = time.time()
                          ts_resp = session.get(ts_url, timeout=DETECT_TIMEOUT, stream=True, verify=False)
                          if ts_resp.status_code == 200:
                              bytes_downloaded = 0
                              for chunk in ts_resp.iter_content(chunk_size=8192):
                                  if chunk:
                                      bytes_downloaded += len(chunk)
                                      if time.time() - start >= DETECT_TIMEOUT:
                                          break
                              if bytes_downloaded < MIN_CHUNK_SIZE:
                                  continue
                              cost = round(time.time() - start, 2)
                              ts_costs.append(cost)
                      except:
                          continue
                  
                  if len(ts_costs) < 1:
                      return False, [], 0.0, 0.0, []
                  
                  avg_cost = round(sum(ts_costs) / len(ts_costs), 2)
                  cost_dev = round(calculate_standard_deviation(ts_costs), 2)
                  return True, ts_urls, avg_cost, cost_dev, ts_costs
              except Exception as e:
                  return False, [], 0.0, 0.0, []
          
          def merged_stream_test(channel_url):
              """流测试 - 仅统计耗时/波动/质量分，取消所有阈值判定"""
              try:
                  has_stream, urls, avg_cost, cost_dev, ts_costs = smart_ts_detection(channel_url)
                  # 仅判定流是否可用，无任何耗时/波动阈值淘汰
                  if not has_stream:
                      return False, 0.0, False, 0, "流不可用", 0.0, []
                  
                  # 质量分仅作参考，无淘汰逻辑
                  if avg_cost <= 3 and cost_dev <= 0.8:
                      quality = 95
                      stable = True
                  elif avg_cost <= 6 and cost_dev <= 1.2:
                      quality = 80
                      stable = True
                  elif avg_cost <= 10 and cost_dev <= 2.0:
                      quality = 70
                      stable = True
                  else:
                      quality = 60
                      stable = False
                  
                  # 分片数加分优化
                  if len(urls) >= 6:
                      quality += 5
                  elif len(urls) >= 4:
                      quality += 3
                  quality = min(100, quality)
                  
                  return True, avg_cost, stable, quality, "流可用(仅统计耗时)", cost_dev, ts_costs
              except Exception as e:
                  return False, 0.0, False, 0, f"检测失败: {str(e)[:20]}", 0.0, []
          
          def batch_stream_test(ip_port, channels):
              """批量测试频道 - 仅测试1个首个CCTV频道，无阈值判定"""
              best_cost = None  # 初始化为None，代表未获取有效耗时
              best_stable = False
              best_quality = 0
              best_dev = 999.99
              tested = 0
              
              # 优先测试CCTV频道，仅取第一个
              priority_channels = []
              for name, url in channels:
                  if "CCTV" in name.upper():
                      priority_channels.append((name, url))
                      break  # 仅保留第一个CCTV频道，直接退出循环
              # 无CCTV频道则取第一个任意频道
              test_channel = priority_channels[0] if priority_channels else (channels[0] if channels else None)
              
              # 仅测试1个频道
              if test_channel:
                  tested += 1
                  channel_name, channel_url = test_channel
                  available, cost, stable, quality, diagnosis, cost_dev, ts_costs = merged_stream_test(channel_url)
                  if not available:
                      print(f"      {channel_name}: ❌ {diagnosis} | 分片耗时: {ts_costs} | 波动: {cost_dev}")
                  else:
                      print(f"      {channel_name}: ✅ {diagnosis} | 平均耗时: {cost}秒 | 分片耗时: {ts_costs} | 波动: {cost_dev} | 质量: {quality}分")
                      best_cost = cost
                      best_stable = stable
                      best_quality = quality
                      best_dev = cost_dev
              
              return best_cost, best_stable, best_quality, tested, best_dev
          
          def hotel_ip_port_from_urls(url_list):
              """主函数：提取IP端口+统计耗时，新增FOFA IP合并，完全保留原有逻辑"""
              # 第一步：从FOFA爬取iptv/live/相关IP:端口
              fofa_ip_set = fofa_crawl_ip()
              # 第二步：从原有直播源URL提取含hls/、tsfile/live/的IP和端口
              url_ip_set = set()
              
              print("\n步骤1: 从直播源URL提取含hls/、tsfile/live/的IP和端口...")
              for url in url_list:
                  try:
                      response = requests.get(url, timeout=15, headers=HEADERS, verify=False)
                      response.raise_for_status()
                      lines = response.text.splitlines()
                      
                      for line in lines:
                          line = line.strip()
                          if not line or line.startswith('#') or ',' not in line:
                              continue
                          parts = line.split(',', 1)
                          if len(parts) < 2:
                              continue
                          url_part = parts[1].strip()
                          match = re.search(r'https?://([^:/]+):(\d+)', url_part)
                          # 核心修改：仅提取含hls/ 或 tsfile/live/的IP:端口
                          if match and ('hls/' in url_part or 'tsfile/live/' in url_part):
                              ip = match.group(1)
                              port = match.group(2)
                              if not ip.startswith(('10.', '172.16.', '192.168.', '127.')):
                                  url_ip_set.add(f"{ip}:{port}")
                      print(f"  从 {url} 提取完成")
                  except Exception as e:
                      print(f"处理URL {url} 时发生错误: {e}")
              
              # 合并FOFA爬取的IP和原有提取的IP，自动去重，无任何额外处理
              ip_port_set = fofa_ip_set.union(url_ip_set)
              print(f"\n【合并去重】FOFA爬取{len(fofa_ip_set)}个 + 原有提取{len(url_ip_set)}个 = 总{len(ip_port_set)}个唯一IP:端口")
              ip_port_list = list(ip_port_set)
              
              print(f"\n步骤2: 检测IP端口有效性...")
              available_ips = []
              with ThreadPoolExecutor(max_workers=10) as executor:
                  future_to_ip = {executor.submit(check_ip_availability, ip_port): ip_port for ip_port in ip_port_list}
                  for future in as_completed(future_to_ip):
                      ip_port = future_to_ip[future]
                      try:
                          is_available, interface_url = future.result()
                          if is_available:
                              available_ips.append((ip_port, interface_url))
                              print(f"  ✓ {ip_port} 可用 (接口: {interface_url})")
                          else:
                              print(f"  ✗ {ip_port} 不可用")
                      except Exception as e:
                          print(f"检测 {ip_port} 时出错: {e}")
              
              print(f"\n共 {len(available_ips)} 个IP:端口可用")
              if not available_ips:
                  print("警告: 没有找到可用的IP端口，直接使用所有提取的IP端口")
                  for ip_port in ip_port_list:
                      available_ips.append((ip_port, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"))
              
              print(f"\n步骤3: 从可用IP解析频道信息并统计下载耗时（仅测1个核心频道，无阈值淘汰）...")
              speed_tested_ips = []
              for idx, (ip_port, interface_url) in enumerate(available_ips, 1):
                  try:
                      print(f"  [{idx}/{len(available_ips)}] 处理 {ip_port}...")
                      channels = hotel_channels_from_ip_port(ip_port, interface_url)
                      if not channels:
                          print(f"    {ip_port}: 无频道信息，尝试备用接口...")
                          alt_url = f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt" if "iptv" in interface_url else f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                          channels = hotel_channels_from_ip_port(ip_port, alt_url)
                      if not channels:
                          print(f"    {ip_port}: 无频道信息，跳过")
                          continue
                      cctv_channels = [(name, url) for name, url in channels if "CCTV" in name.upper()] or channels
                      print(f"    {ip_port}: 找到 {len(cctv_channels)} 个频道，仅测1个核心频道...")
                      best_cost, best_stable, best_quality, tested_count, best_dev = batch_stream_test(ip_port, cctv_channels)
                      if tested_count == 0 or best_cost is None:  # 仅过滤无有效耗时的IP
                          print(f"    {ip_port}: 跳过 | 无有效分片下载耗时（流失效/超时）")
                          continue
                      # 取消所有阈值判定，只要有有效耗时就加入列表
                      speed_tested_ips.append((ip_port, (best_cost, best_stable, best_quality, best_dev)))
                      stable_tag = "✅稳定" if best_stable else "⚠️不稳定"
                      print(f"    {ip_port}: {stable_tag} 已统计 | 下载耗时: {best_cost:.2f}秒 | 波动: {best_dev:.2f} | 质量: {best_quality}分")
                  except Exception as e:
                      print(f"    {ip_port}: 处理失败 - {e}")
              
              # 核心排序规则：仅按【下载耗时升序】排序（耗时越短越优）
              speed_tested_ips.sort(key=lambda x: x[1][0])
              print(f"\n步骤4: 保存所有有效IP端口（按下载耗时升序）...")
              output_dir = "Hotel/ip"
              os.makedirs(output_dir, exist_ok=True)
              output_file = os.path.join(output_dir, "hotel_ip.txt")
              with open(output_file, 'w', encoding='utf-8') as f:
                  for ip_port, _ in speed_tested_ips:
                      f.write(f"{ip_port}\n")
              # 无有效IP时的兜底
              if not speed_tested_ips:
                  with open(output_file, 'w', encoding='utf-8') as f:
                      for ip_port, _ in available_ips:
                          f.write(f"{ip_port}  # 无有效下载耗时\n")
              
              # 输出统计结果，新增FOFA相关统计，其余完全保留
              print(f"\n" + "="*80)
              print(f"处理完成统计【FOFA+原有提取 | 仅提取hls/、tsfile/live/ | 无阈值判定 | 仅测1个核心频道】")
              print(f"  - FOFA爬取iptv/live/相关IP: {len(fofa_ip_set)} 个")
              print(f"  - 直播源提取IP端口: {len(url_ip_set)} 个")
              print(f"  - 合并去重后总IP: {len(ip_port_set)} 个")
              print(f"  - 可用IP端口: {len(available_ips)} 个")
              print(f"  - 有效IP端口(获取到下载耗时): {len(speed_tested_ips)} 个")
