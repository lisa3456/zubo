name: Hotel_IP

on:
  schedule:
    # 每天凌晨3点自动运行（UTC时间，北京时间+8）
    - cron: '0 9 * * *'
  # push:
  #   # 当脚本文件有更新时触发
  #   paths:
  #     - 'hotel_ip_port.yml'
  # pull_request:
  #   paths:
  #     - 'hotel_ip_port.yml'
  # 支持手动触发
  workflow_dispatch:

jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pysocks aiohttp eventlet
        
    - name: 提取ip并检测
      run: |
        cat > hotel_ip_port.py << 'EOF'
        import requests
        import re
        import os
        import random
        import time
        import json
        from urllib.parse import urlparse
        from concurrent.futures import ThreadPoolExecutor, as_completed
        
        # 请求头设置
        HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': 'application/json,text/plain,*/*',
            'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
            'Connection': 'keep-alive',
        }
        
        def check_ip_availability(ip_port, timeout=2):
            """检测IP:端口是否可用"""
            try:
                # 尝试连接HTTP服务
                test_urls = [
                    f"http://{ip_port}/iptv/live/1000.json?key=txiptv",
                    f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                ]
                
                for url in test_urls:
                    try:
                        response = requests.get(url, timeout=timeout, headers=HEADERS, verify=False)
                        if response.status_code == 200:
                            return True, url
                    except:
                        continue
                        
                return False, None
            except Exception as e:
                return False, None
        
        def hotel_channels_from_ip_port(ip_port, interface_url):
            """
            从IP:端口的接口解析频道信息
            返回频道列表 [(频道名称, 频道URL), ...]
            """
            hotel_channels = []
            try:
                # 发送GET请求获取数据
                response = requests.get(interface_url, timeout=3, headers=HEADERS, verify=False)
                
                if "iptv" in interface_url:
                    # 处理JSON格式
                    json_data = response.json()
                    
                    for item in json_data.get('data', []):
                        if isinstance(item, dict):
                            name = item.get('name', '')
                            urlx = item.get('url', '')
                            if name and urlx and ("tsfile" in urlx or "m3u8" in urlx or "hls" in urlx):
                                # 确保urlx以斜杠开头,避免双斜杠
                                if not urlx.startswith('/'):
                                    urlx = '/' + urlx
                                urld = f"http://{ip_port}{urlx}"
                                hotel_channels.append((name, urld))
                elif "ZHGXTV" in interface_url:
                    # 处理TXT格式
                    content = response.text
                    data_lines = content.split('\\n')
                    
                    for line in data_lines:
                        line = line.strip()
                        if not line or ',' not in line:
                            continue
                        
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        
                        name = parts[0].strip()
                        full_url = parts[1].strip()
                        
                        # 提取路径部分
                        parsed_url = urlparse(full_url)
                        path_with_query = parsed_url.path
                        if parsed_url.query:
                            path_with_query += '?' + parsed_url.query
                        
                        # 构建新的URL
                        urld = f"http://{ip_port}{path_with_query}"
                        hotel_channels.append((name, urld))
                
                return hotel_channels
            except Exception as e:
                print(f"解析频道错误 {interface_url}: {e}")
                return []
        
        def test_channel_speed(channel_url, timeout=5):
            """
            测试频道链接的下载速度
            返回速度(KB/s)
            """
            try:
                start_time = time.time()
                response = requests.get(channel_url, timeout=timeout, headers=HEADERS, stream=True, verify=False)
                content_length = 0
                chunk_size = 1024  # 1KB
                total_chunks = 0
                
                # 下载前10个chunk来测速
                for chunk in response.iter_content(chunk_size=chunk_size):
                    if chunk:
                        content_length += len(chunk)
                        total_chunks += 1
                        if total_chunks >= 10:  # 只下载10KB来测速
                            break
                
                if content_length == 0:
                    return 0
                
                end_time = time.time()
                download_time = end_time - start_time
                
                if download_time <= 0:
                    return 0
                
                speed_kb = (content_length / 1024) / download_time
                return speed_kb
            except Exception as e:
                return 0
        
        def hotel_ip_port_from_urls(url_list):
            """
            从给定的URL列表中读取直播源文件，提取包含"tsfile"或"hls"的IP和端口
            然后检测IP端口有效性，解析频道，测速，最终保存有效的IP端口
            """
            ip_port_set = set()  # 使用集合自动去重
            
            print("步骤1: 从直播源URL提取IP和端口...")
            for url in url_list:
                try:
                    response = requests.get(url, timeout=10, headers=HEADERS, verify=False)
                    response.raise_for_status()
                    lines = response.text.splitlines()
                    
                    for line in lines:
                        line = line.strip()
                        if not line or line.startswith('#') or ',' not in line:
                            continue
                        
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        
                        url_part = parts[1].strip()
                        if 'tsfile' in url_part or 'hls' in url_part or 'm3u8' in url_part:
                            # 尝试多种方式提取IP和端口
                            match = re.search(r'https?://([^:/]+):(\d+)', url_part)
                            if match:
                                ip = match.group(1)
                                port = match.group(2)
                                ip_port_set.add(f"{ip}:{port}")
                            else:
                                # 如果正则匹配失败，尝试使用urlparse
                                parsed_url = urlparse(url_part)
                                if parsed_url.hostname and parsed_url.port:
                                    ip_port_set.add(f"{parsed_url.hostname}:{parsed_url.port}")
                                elif parsed_url.hostname and parsed_url.scheme in ['http', 'https']:
                                    # 没有显式端口，使用默认端口
                                    default_port = 443 if parsed_url.scheme == 'https' else 80
                                    ip_port_set.add(f"{parsed_url.hostname}:{default_port}")
                    
                    print(f"  从 {url} 提取完成")
                    
                except requests.exceptions.RequestException as e:
                    print(f"网络请求错误: 处理URL {url} 时失败 - {e}")
                except Exception as e:
                    print(f"处理URL {url} 时发生未知错误: {e}")
            
            print(f"共提取到 {len(ip_port_set)} 个IP:端口")
            
            # 转换为列表
            ip_port_list = list(ip_port_set)
            
            print(f"\\n步骤2: 检测IP端口有效性...")
            available_ips = []
            
            # 使用线程池并发检测
            with ThreadPoolExecutor(max_workers=20) as executor:
                future_to_ip = {executor.submit(check_ip_availability, ip_port): ip_port for ip_port in ip_port_list}
                
                for future in as_completed(future_to_ip):
                    ip_port = future_to_ip[future]
                    try:
                        is_available, interface_url = future.result()
                        if is_available:
                            available_ips.append((ip_port, interface_url))
                            print(f"  ✓ {ip_port} 可用 (接口: {interface_url})")
                        else:
                            print(f"  ✗ {ip_port} 不可用")
                    except Exception as e:
                        print(f"检测 {ip_port} 时出错: {e}")
            
            print(f"\\n共 {len(available_ips)} 个IP:端口可用")
            
            print(f"\\n步骤3: 从可用IP解析频道信息并测速...")
            speed_tested_ips = []
            
            for idx, (ip_port, interface_url) in enumerate(available_ips, 1):
                try:
                    print(f"  [{idx}/{len(available_ips)}] 处理 {ip_port}...")
                    
                    # 解析频道
                    channels = hotel_channels_from_ip_port(ip_port, interface_url)
                    
                    if not channels:
                        print(f"    {ip_port}: 无频道信息")
                        continue
                    
                    # 过滤包含"CCTV"的频道
                    cctv_channels = [(name, url) for name, url in channels if "CCTV" in name.upper()]
                    
                    if not cctv_channels:
                        print(f"    {ip_port}: 无CCTV频道")
                        continue
                    
                    print(f"    {ip_port}: 找到 {len(cctv_channels)} 个CCTV频道")
                    
                    # 随机选择一个CCTV频道进行测速
                    random_channel_name, random_channel_url = random.choice(cctv_channels)
                    
                    print(f"    {ip_port}: 测试频道 [{random_channel_name}]")
                    speed = test_channel_speed(random_channel_url)
                    
                    if speed > 100:  # 速度大于100KB/s
                        speed_tested_ips.append(ip_port)
                        print(f"    {ip_port}: 通过测速 ({speed:.2f} KB/s)")
                    else:
                        print(f"    {ip_port}: 测速失败 ({speed:.2f} KB/s)")
                        
                except Exception as e:
                    print(f"    {ip_port}: 处理失败 - {e}")
            
            print(f"\\n步骤4: 保存通过测速的IP端口...")
            
            # 保存到文件
            output_dir = "Hotel/ip"
            os.makedirs(output_dir, exist_ok=True)
            output_file = os.path.join(output_dir, "hotel_ip.txt")
            
            with open(output_file, 'w', encoding='utf-8') as f:
                for ip_port in sorted(speed_tested_ips):
                    f.write(f"{ip_port}\\n")
            
            # 统计信息
            print(f"\\n" + "="*50)
            print(f"处理完成统计:")
            print(f"  - 初始提取IP端口: {len(ip_port_set)} 个")
            print(f"  - 可用IP端口: {len(available_ips)} 个")
            print(f"  - 通过测速IP端口: {len(speed_tested_ips)} 个")
            print(f"  - 结果已保存到: {output_file}")
            print("="*50)
            
            if speed_tested_ips:
                print(f"\\n通过测速的IP端口 (前20个):")
                for i, ip_port in enumerate(speed_tested_ips[:20], 1):
                    print(f"  {i:2d}. {ip_port}")
                if len(speed_tested_ips) > 20:
                    print(f"  ... 还有 {len(speed_tested_ips)-20} 个")
            else:
                print("\\n警告: 没有找到通过测速的IP端口")
        
        if __name__ == "__main__":
            # 禁用SSL警告
            import urllib3
            urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
            
            # 示例URL列表
            urls = [
                "https://raw.githubusercontent.com/jn950/live/refs/heads/main/tv/holive.m3u",  # txt格式
                "https://raw.githubusercontent.com/whyun-pages/hotel-tvn/refs/heads/main/lives.txt",
                "https://raw.githubusercontent.com/mzky/checklist/refs/heads/master/itvlist.m3u",
                #"http://129.211.14.102:50085/sub?tv.sohu.blog=txt",
                #"https://raw.githubusercontent.com/kenye201/TVlog/refs/heads/main/final_hotel.txt",
            ]
            
            hotel_ip_port_from_urls(urls)
        EOF
        
        python hotel_ip_port.py
    
    - name: 运行主脚本生成iptv.txt
      run: |
        python Hotel/hotel.py
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Hotel/ip/hotel_ip.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: 提取 IP and Port $(date '+%Y-%m-%d %H:%M:%S')"
        git push
