name: hotel IP and Port 
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
jobs:
  hotel-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install pysocks
        
    - name: 提取ip_port
      run: |
        cat > hotel_ip_port.py << 'EOF'
        import requests
        import re
        import os
        import random
        import time
        import json
        import socket
        from urllib.parse import urlparse, urljoin
        from concurrent.futures import ThreadPoolExecutor, as_completed
        
        # 请求头设置
        HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
            'Accept': '*/*',
            'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8',
            'Connection': 'keep-alive',
            'Accept-Encoding': 'gzip, deflate',
        }
        
        def check_tcp_connection(ip, port, timeout=3):
            """测试TCP连接是否可用"""
            try:
                sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                sock.settimeout(timeout)
                result = sock.connect_ex((ip, int(port)))
                sock.close()
                return result == 0
            except:
                return False
        
        def check_ip_availability(ip_port, timeout=5):
            """检测IP:端口是否可用"""
            try:
                ip, port = ip_port.split(':')
                
                # 先测试TCP连接
                if not check_tcp_connection(ip, port, timeout=2):
                    print(f"  {ip_port}: TCP连接失败")
                    return False, None
                
                print(f"  {ip_port}: TCP连接成功")
                
                # 尝试连接HTTP服务
                test_urls = [
                    f"http://{ip_port}/iptv/live/1000.json?key=txiptv",
                    f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt",
                    f"http://{ip_port}/",  # 根目录
                    f"http://{ip_port}/iptv/live/",  # iptv目录
                    f"http://{ip_port}/ZHGXTV/Public/json/"  # ZHGXTV目录
                ]
                
                session = requests.Session()
                
                for url in test_urls:
                    try:
                        response = session.get(url, timeout=timeout, headers=HEADERS, verify=False)
                        print(f"  {ip_port}: 尝试 {url} - 状态码: {response.status_code}")
                        
                        if response.status_code == 200:
                            # 检查内容类型
                            content_type = response.headers.get('Content-Type', '')
                            content = response.text[:100]  # 只取前100个字符
                            
                            # JSON接口检测
                            if "1000.json" in url or "json" in content_type.lower():
                                try:
                                    json_data = response.json()
                                    if "data" in json_data or "code" in json_data:
                                        print(f"  {ip_port}: JSON接口可用")
                                        return True, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                                except:
                                    pass
                            
                            # TXT接口检测
                            if "live_interface.txt" in url or "txt" in content_type.lower() or ("CCTV" in content and "," in content):
                                print(f"  {ip_port}: TXT接口可用")
                                return True, f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                            
                            # 其他成功的HTTP响应
                            if response.status_code == 200 and len(response.content) > 0:
                                print(f"  {ip_port}: HTTP服务可用 (URL: {url})")
                                # 尝试判断是哪种接口
                                if "iptv" in url:
                                    return True, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                                elif "ZHGXTV" in url:
                                    return True, f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                                else:
                                    # 返回第一个可用的URL
                                    return True, url
                                    
                    except requests.exceptions.ConnectionError:
                        continue
                    except requests.exceptions.Timeout:
                        continue
                    except Exception as e:
                        continue
                
                print(f"  {ip_port}: 所有接口测试失败")
                return False, None
                
            except Exception as e:
                print(f"  {ip_port}: 检测异常 - {str(e)[:50]}")
                return False, None
        
        def hotel_channels_from_ip_port(ip_port, interface_url):
            """
            从IP:端口的接口解析频道信息
            返回频道列表 [(频道名称, 频道URL), ...]
            """
            hotel_channels = []
            try:
                # 发送GET请求获取数据
                response = requests.get(interface_url, timeout=10, headers=HEADERS, verify=False)
                
                # 根据接口类型处理
                if "iptv" in interface_url or "json" in interface_url:
                    # 处理JSON格式
                    try:
                        json_data = response.json()
                        
                        # 检查不同的JSON格式
                        if isinstance(json_data, dict):
                            # 格式1: {"data": [...]}
                            if "data" in json_data and isinstance(json_data["data"], list):
                                for item in json_data["data"]:
                                    if isinstance(item, dict):
                                        name = item.get('name', '') or item.get('channel_name', '') or item.get('title', '')
                                        urlx = item.get('url', '') or item.get('urlx', '') or item.get('stream_url', '')
                                        if name and urlx and ("tsfile" in urlx or "m3u8" in urlx or "hls" in urlx or ".ts" in urlx):
                                            # 确保urlx以斜杠开头,避免双斜杠
                                            if not urlx.startswith('/'):
                                                urlx = '/' + urlx
                                            urld = f"http://{ip_port}{urlx}"
                                            hotel_channels.append((name, urld))
                            
                            # 格式2: 直接是列表
                            elif isinstance(json_data, list):
                                for item in json_data:
                                    if isinstance(item, dict):
                                        name = item.get('name', '') or item.get('channel_name', '') or item.get('title', '')
                                        urlx = item.get('url', '') or item.get('urlx', '') or item.get('stream_url', '')
                                        if name and urlx and ("tsfile" in urlx or "m3u8" in urlx or "hls" in urlx or ".ts" in urlx):
                                            if not urlx.startswith('/'):
                                                urlx = '/' + urlx
                                            urld = f"http://{ip_port}{urlx}"
                                            hotel_channels.append((name, urld))
                    except json.JSONDecodeError:
                        # 如果不是JSON，尝试按TXT格式处理
                        pass
                
                # 处理TXT格式
                content = response.text
                
                # 尝试按行分割
                lines = content.split('\n')
                for line in lines:
                    line = line.strip()
                    if not line or line.startswith('#') or ',' not in line:
                        continue
                    
                    parts = line.split(',', 1)
                    if len(parts) < 2:
                        continue
                    
                    name = parts[0].strip()
                    full_url = parts[1].strip()
                    
                    # 提取路径部分
                    parsed_url = urlparse(full_url)
                    path = parsed_url.path
                    if parsed_url.query:
                        path += '?' + parsed_url.query
                    
                    # 构建基于当前IP端口的URL
                    urld = f"http://{ip_port}{path}"
                    hotel_channels.append((name, urld))
                
                # 如果还没有找到频道，尝试其他格式
                if not hotel_channels and "CCTV" in content and ("m3u8" in content or ".ts" in content):
                    # 尝试提取类似 "CCTV1,http://..." 的格式
                    pattern = r'([^,]+?CCTV[^,]*?),([^\s]+)'
                    matches = re.findall(pattern, content)
                    for name, url in matches:
                        parsed_url = urlparse(url.strip())
                        path = parsed_url.path
                        if parsed_url.query:
                            path += '?' + parsed_url.query
                        urld = f"http://{ip_port}{path}"
                        hotel_channels.append((name.strip(), urld))
                
                return hotel_channels
            except Exception as e:
                print(f"解析频道错误 {interface_url}: {e}")
                return []
        
        def test_stream_speed(channel_url, timeout=10):
            """
            稳定性优先版测速：
            - 只要能持续输出数据，就算低速也标记为可用
            - 延长测速到8秒，更贴近真实播放
            """
            try:
                session = requests.Session()
                session.headers.update(HEADERS)
                response = session.get(channel_url, timeout=timeout, verify=False, stream=True)
                if response.status_code != 200:
                    return 0.0

                start_time = time.time()
                warmup_end = start_time + 1
                test_end = start_time + 8  # 延长到8秒，更稳
                downloaded = 0
                chunk_size = 64 * 1024
                last_chunk_time = time.time()
                interrupt_count = 0

                for chunk in response.iter_content(chunk_size=chunk_size):
                    current_time = time.time()
                    if current_time > test_end:
                        break
                    # 断流超过3秒算一次中断
                    if current_time - last_chunk_time > 3:
                        interrupt_count += 1
                    last_chunk_time = current_time
                    if current_time > warmup_end and chunk:
                        downloaded += len(chunk)

                effective_time = min(test_end, time.time()) - warmup_end
                effective_time = max(effective_time, 0.1)
                real_speed = (downloaded / 1024) / effective_time

                # 只要中断少，就算速度低也给一个基础分
                if interrupt_count == 0 and real_speed > 0.5:
                    return round(max(real_speed, 2.0), 2)  # 稳定流保底2KB/s
                elif interrupt_count <= 1 and real_speed > 0.5:
                    return round(real_speed, 2)
                else:
                    return 0.1  # 轻微不稳定也给个基础值

            except requests.exceptions.Timeout:
                return 0.1
            except requests.exceptions.ConnectionError:
                return 0.0
            except Exception as e:
                return 0.0
        
        def hotel_ip_port_from_urls(url_list):
            """
            从给定的URL列表中读取直播源文件，提取包含"tsfile"或"hls"的IP和端口
            然后检测IP端口有效性，解析频道，测速，最终保存有效的IP端口
            """
            ip_port_set = set()  # 使用集合自动去重
            
            print("步骤1: 从直播源URL提取IP和端口...")
            for url in url_list:
                try:
                    response = requests.get(url, timeout=15, headers=HEADERS, verify=False)
                    response.raise_for_status()
                    lines = response.text.splitlines()
                    
                    for line in lines:
                        line = line.strip()
                        if not line or line.startswith('#') or ',' not in line:
                            continue
                        
                        parts = line.split(',', 1)
                        if len(parts) < 2:
                            continue
                        
                        url_part = parts[1].strip()
                        if 'tsfile' in url_part or 'hls' in url_part or 'm3u8' in url_part:
                            # 尝试多种方式提取IP和端口
                            match = re.search(r'https?://([^:/]+):(\d+)', url_part)
                            if match:
                                ip = match.group(1)
                                port = match.group(2)
                                ip_port_set.add(f"{ip}:{port}")
                    
                    print(f"  从 {url} 提取完成")
                    
                except Exception as e:
                    print(f"处理URL {url} 时发生错误: {e}")
            
            print(f"共提取到 {len(ip_port_set)} 个IP:端口")
            
            # 转换为列表
            ip_port_list = list(ip_port_set)
            
            print(f"\n步骤2: 检测IP端口有效性...")
            available_ips = []
            
            # 使用线程池并发检测，保持10线程兼顾效率和压力
            with ThreadPoolExecutor(max_workers=10) as executor:
                future_to_ip = {executor.submit(check_ip_availability, ip_port): ip_port for ip_port in ip_port_list}
                
                for future in as_completed(future_to_ip):
                    ip_port = future_to_ip[future]
                    try:
                        is_available, interface_url = future.result()
                        if is_available:
                            available_ips.append((ip_port, interface_url))
                            print(f"  ✓ {ip_port} 可用 (接口: {interface_url})")
                        else:
                            print(f"  ✗ {ip_port} 不可用")
                    except Exception as e:
                        print(f"检测 {ip_port} 时出错: {e}")
            
            print(f"\n共 {len(available_ips)} 个IP:端口可用")
            
            if not available_ips:
                print("警告: 没有找到可用的IP端口，直接使用所有提取的IP端口")
                for ip_port in ip_port_list:
                    available_ips.append((ip_port, f"http://{ip_port}/iptv/live/1000.json?key=txiptv"))
                print(f"将使用所有 {len(available_ips)} 个IP端口进行测试")
            
            print(f"\n步骤3: 从可用IP解析频道信息并测速...")
            speed_tested_ips = []
            
            for idx, (ip_port, interface_url) in enumerate(available_ips, 1):
                try:
                    print(f"  [{idx}/{len(available_ips)}] 处理 {ip_port}...")
                    
                    # 解析频道
                    channels = hotel_channels_from_ip_port(ip_port, interface_url)
                    
                    if not channels:
                        print(f"    {ip_port}: 无频道信息，尝试备用接口...")
                        if "iptv" in interface_url:
                            alt_url = f"http://{ip_port}/ZHGXTV/Public/json/live_interface.txt"
                        else:
                            alt_url = f"http://{ip_port}/iptv/live/1000.json?key=txiptv"
                        channels = hotel_channels_from_ip_port(ip_port, alt_url)
                    
                    if not channels:
                        print(f"    {ip_port}: 无频道信息，跳过")
                        continue
                    
                    # 过滤包含"CCTV"的频道
                    cctv_channels = [(name, url) for name, url in channels if "CCTV" in name.upper()]
                    
                    if not cctv_channels:
                        print(f"    {ip_port}: 无CCTV频道，使用所有频道测试")
                        cctv_channels = channels
                    
                    print(f"    {ip_port}: 找到 {len(cctv_channels)} 个可测试频道")
                    
                    # 尝试多个频道测速，取最高速度，最多测3个控制时长
                    best_speed = 0
                    tested_channels = 0
                    max_test_channels = min(3, len(cctv_channels))
                    
                    # 随机选择频道，避免固定频道偏差
                    test_channels = random.sample(cctv_channels, max_test_channels) if len(cctv_channels) > 1 else cctv_channels
                    
                    for channel_name, channel_url in test_channels:
                        tested_channels += 1
                        print(f"    {ip_port}: 测试频道 [{channel_name}] ({tested_channels}/{max_test_channels})")
                        
                        # 测速（调用稳定性优先版测速函数）
                        speed = test_stream_speed(channel_url)
                        
                        if speed > best_speed:
                            best_speed = speed
                        
                        print(f"    {ip_port}: 频道 [{channel_name}] 真实播放速度: {speed:.2f} KB/s")
                        
                        if speed > 500:
                            break
                    
                    # 保持0.1阈值，让稳定低速流也能通过
                    if best_speed > 0.1:
                        speed_tested_ips.append((ip_port, best_speed))
                        print(f"    {ip_port}: 通过测速 (最佳真实播放速度: {best_speed:.2f} KB/s)")
                    else:
                        print(f"    {ip_port}: 测速失败 (最佳真实播放速度: {best_speed:.2f} KB/s)")
                        
                except Exception as e:
                    print(f"    {ip_port}: 处理失败 - {e}")
            
            # 按真实播放速度降序排序
            speed_tested_ips.sort(key=lambda x: x[1], reverse=True)
            
            # ========== 强制加入你实测流畅的3个IP ==========
            manual_ips = [
                ("110.241.188.75:808", 20.0),  # 你实测最流畅
                ("121.19.134.142:808", 15.0),  # 你实测流畅
                ("xxx.xxx.xxx.xxx:xxxx", 10.0), # 把第三个IP填在这里
            ]
            for ip_port, speed in manual_ips:
                if ip_port not in [x[0] for x in speed_tested_ips]:
                    speed_tested_ips.append((ip_port, speed))
            # 重新排序，让手动IP也按速度排序
            speed_tested_ips.sort(key=lambda x: x[1], reverse=True)
            # ==============================================
            
            print(f"\n步骤4: 保存通过测速的IP端口...")
            
            # 保存到文件
            output_dir = "Hotel/ip"
            os.makedirs(output_dir, exist_ok=True)
            output_file = os.path.join(output_dir, "hotel_ip.txt")
            
            with open(output_file, 'w', encoding='utf-8') as f:
                for ip_port, speed in speed_tested_ips:
                    f.write(f"{ip_port}\n")
            
            # 如果没有通过测速的，保存所有可用的IP端口
            if not speed_tested_ips:
                print("没有通过测速的IP端口，保存所有可用IP端口")
                with open(output_file, 'w', encoding='utf-8') as f:
                    for ip_port, _ in available_ips:
                        f.write(f"{ip_port}  # 未通过真实播放测速\n")
                speed_tested_ips = [(ip_port, 0) for ip_port, _ in available_ips]
            
            # 统计信息
            print(f"\n" + "="*60)
            print(f"处理完成统计 (基于真实播放速度测速):")
            print(f"  - 初始提取IP端口: {len(ip_port_set)} 个")
            print(f"  - TCP+HTTP可用IP端口: {len(available_ips)} 个")
            print(f"  - 真实播放速度达标IP端口: {len(speed_tested_ips)} 个")
            print(f"  - 结果已保存到: {output_file}")
            print("="*60)
            
            if speed_tested_ips:
                print(f"\n真实播放速度达标IP端口 (按速度从快到慢排序):")
                show_num = min(20, len(speed_tested_ips))
                for i, (ip_port, speed) in enumerate(speed_tested_ips[:show_num], 1):
                    print(f"  {i:2d}. {ip_port} - 真实播放速度: {speed:.2f} KB/s")
                if len(speed_tested_ips) > 20:
                    print(f"  ... 还有 {len(speed_tested_ips)-20} 个达标IP端口")
            else:
                print("\n警告: 没有找到真实播放速度达标的IP端口")
        
        if __name__ == "__main__":
            import urllib3
            urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
            
            urls = [
                "https://raw.githubusercontent.com/jn950/live/refs/heads/main/tv/holive.m3u",
                "https://raw.githubusercontent.com/whyun-pages/hotel-tvn/refs/heads/main/lives.txt",
                "https://raw.githubusercontent.com/mzky/checklist/refs/heads/master/itvlist.m3u",
                "https://github.com/adminouyang/TV-yjc/raw/refs/heads/main/Hotel/iptv.txt"
            ]
            
            hotel_ip_port_from_urls(urls)
        EOF
        
        python hotel_ip_port.py
      
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add Hotel/ip/hotel_ip.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "自动更新提取 IP and Port $(date '+%Y-%m-%d %H:%M:%S')"
        git push
