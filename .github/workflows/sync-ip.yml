name: Sync IP Folder

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout 本仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 克隆目标仓库并提取 IP 文件夹
        run: |
          # 临时克隆目标仓库（只克隆最新版本）
          git clone --depth 1 https://github.com/adminouyang/TV-yjc.git temp-tvyjc
          # 复制 IP_Scan/ip 文件夹内容到本仓库的 ip/ 目录
          cp -r temp-tvyjc/IP_Scan/result_ip/* ./ip/
          # 删除临时文件夹
          rm -rf temp-tvyjc

      - name: 提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add ip/
          git commit -m "Auto sync ip files from TV-yjc" || echo "No changes to commit"
          git push
